target-version = "py313"
line-length = 100

[lint]
select = [
    "E",   #  errors
    "W",   # warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line too long — handled by formatter
]

[lint.isort]
known-first-party = ["src"]

[lint.per-file-ignores]
# Pre-existing issues in src/ — suppress until a dedicated cleanup PR
"src/*.py" = [
    "I001",  # import sort order
    "F401",  # unused imports
    "W291",  # trailing whitespace
    "W292",  # no newline at end of file
    "F821",  # undefined name (known bugs in inference_run.py)
    "E401",  # multiple imports on one line
]

[format]
quote-style = "double"
indent-style = "space"
